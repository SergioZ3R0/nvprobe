<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#111111"/>
    </radialGradient>
    
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="200" height="200" rx="40" fill="url(#bgGrad)"/>
  
  <rect x="50" y="50" width="100" height="100" rx="12" fill="#1e1e1e" stroke="#76b900" stroke-width="4"/>
  
  <path d="M 35 70 h 15 M 35 100 h 15 M 35 130 h 15 
           M 150 70 h 15 M 150 100 h 15 M 150 130 h 15 
           M 70 35 v 15 M 100 35 v 15 M 130 35 v 15 
           M 70 150 v 15 M 100 150 v 15 M 130 150 v 15" 
        stroke="#76b900" stroke-width="4" stroke-linecap="round"/>
        
  <polyline points="65,110 85,110 100,75 115,120 135,95" 
            fill="none" stroke="#00ff9d" stroke-width="7" 
            stroke-linejoin="round" stroke-linecap="round"
            filter="url(#neonGlow)"/>
</svg>
