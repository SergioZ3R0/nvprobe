name: local-benchmark
description: Local benchmark run (no Slurm)

gpu:
  models: []
  min_count: 1

slurm:
  enabled: false

precisions:
  - fp32
  - fp16

batch_sizes:
  - 1
  - 32
  - 64

benchmarks:
  - name: bandwidth
    enabled: true
    params:
      sizes_mb: [1, 4, 16, 64, 256]
      iterations: 50

  - name: custom
    enabled: true
    params:
      kernels:
        - matmul
        - attention
      matrix_sizes: [512, 1024, 2048]
      iterations: 25
