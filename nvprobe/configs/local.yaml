name: local-benchmark
description: Local benchmark run (no Slurm)

gpu:
  models: []
  min_count: 1

slurm:
  enabled: false

precisions:
  - fp32
  - fp16

batch_sizes:
  - 1
  - 32
  - 64

benchmarks:
  - name: bandwidth
    enabled: true
    params:
      sizes_mb: [1, 4, 16, 64, 256]
      iterations: 50

  - name: custom
    enabled: true
    params:
      kernels:
        - matmul
        - attention
      matrix_sizes: [512, 1024, 2048]
      iterations: 25

  - name: hpl
    enabled: true
    params:
      problem_sizes: [4096, 8192]
      binary: "~/.nvprobe/tools/xhpl"

  - name: hpcg
    enabled: true
    params:
      grid_sizes: [128, 256]
      binary: "~/.nvprobe/tools/xhpcg"

  - name: mlperf
    enabled: false    # requires: pip install --user cmx4mlperf
    params:
      scenario: Offline
      model: resnet50
      framework: onnxruntime
      category: edge
      implementation: reference
      test_query_count: 100
